<!DOCTYPE html>
<html>
<head>
    <title>Welcome to the Beans'R'Us Pricing Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f8f8f8;
        }
        .container {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: auto;
        }
        h2 {
            color: #3b7c3b;
        }
        .price {
            font-size: 24px;
            color: #c0392b;
        }
        .note {
            font-size: 12px;
            color: #888;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Welcome to the Beans'R'Us Pricing Page</h2>
        <p>Current price of coffee beans = <strong class="price">$6.23</strong></p>
        <p>Price valid for 15 minutes from 14:30 on Monday 17/05/2026.</p>
        <div class="note">
            * This is a test page for learning HTML extraction.
            <br>The price shown is a placeholder and does not reflect real market data.
        </div>
    </div>
</body>
</html>
